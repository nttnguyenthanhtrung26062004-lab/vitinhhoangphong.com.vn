<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giới thiệu thành viên</title>
    <style>
        .intro-card {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 15px;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .intro-card h2 { margin-bottom: 10px; }
        .intro-card p { font-size: 16px; opacity: 0.9; }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="intro-card">
        <h2>Xin chào! 👋</h2>
        <p>Tôi là thành viên của dự án <strong>vitinhhoangphong.com.vn</strong></p>
        <p>Hiện đang học phần: <em>Thiết kế web</em></p>
        <div class="badge">Đã cập nhật dữ liệu từ Git thành công</div>
    </div>

</body>
</html>
